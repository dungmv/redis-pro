name: CI - Build & Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Xcode)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use the latest Xcode available on macos-15 runner
          sudo xcode-select --switch /Applications/Xcode.app

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "redis-pro.xcodeproj" \
            -scheme "redis-pro"

      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project "redis-pro.xcodeproj" \
            -scheme "redis-pro" \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run Tests
        run: |
          xcodebuild test \
            -project "redis-pro.xcodeproj" \
            -scheme "redis-pro" \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report html --output test-results.html && exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.html
          retention-days: 7

      - name: Build (Release)
        run: |
          xcodebuild build \
            -project "redis-pro.xcodeproj" \
            -scheme "redis-pro" \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
